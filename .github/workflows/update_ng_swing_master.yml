name: Update NG Swing GDD Master

on:
  workflow_dispatch:
    inputs:
      start_date:
        description: "Start date to pull, format YYYY-MM-DD"
        required: true
        default: "2026-06-01"
      end_date:
        description: "End date to pull, format YYYY-MM-DD"
        required: true
        default: "2026-06-01"
      date_field:
        description: "Use ICE STRIP date or TRADE DATE"
        required: true
        default: "strip"
        type: choice
        options:
          - strip
          - trade_date
      reset_master:
        description: "Delete and recreate the master file before running?"
        required: true
        default: "false"
        type: choice
        options:
          - "false"
          - "true"

jobs:
  update-master:
    runs-on: ubuntu-latest

    permissions:
      contents: write

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Confirm ICE input file
        run: |
          echo "Files in repository:"
          find . -maxdepth 4 -type f

          echo ""
          echo "Files in input folder:"
          ls -la input || true

          if [ ! -f input/icecleared_latest.xlsx ]; then
            echo "ERROR: The ICE file must be named exactly input/icecleared_latest.xlsx"
            exit 1
          fi

          echo "Using input/icecleared_latest.xlsx"

      - name: Prepare master folder
        run: |
          mkdir -p master
          mkdir -p audit

          echo "Master folder contents before run:"
          ls -la master || true

          if [ "${{ github.event.inputs.reset_master }}" = "true" ]; then
            echo "Reset requested. Deleting existing v2 master file."
            rm -f master/master_ng_swing_gdd_v2.xlsx
          fi

          echo "The workflow will use:"
          echo "master/master_ng_swing_gdd_v2.xlsx"

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Update master workbook
        run: |
          python src/update_ng_swing_master.py \
            --daily input/icecleared_latest.xlsx \
            --master master/master_ng_swing_gdd_v2.xlsx \
            --output master/master_ng_swing_gdd_v2.xlsx \
            --start "${{ github.event.inputs.start_date }}" \
            --end "${{ github.event.inputs.end_date }}" \
            --date-field "${{ github.event.inputs.date_field }}" \
            --audit-dir audit

      - name: Confirm output files
        run: |
          echo "Master folder contents after run:"
          ls -la master

          echo ""
          echo "Audit folder contents after run:"
          ls -la audit || true

          if [ ! -f master/master_ng_swing_gdd_v2.xlsx ]; then
            echo "ERROR: master/master_ng_swing_gdd_v2.xlsx was not created."
            exit 1
          fi

          echo "Master file created/updated successfully."

      - name: Upload audit artifact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: ng-swing-gdd-audit
          path: |
            audit/*.csv
            master/master_ng_swing_gdd_v2.xlsx
          if-no-files-found: ignore

      - name: Commit updated files
        if: success()
        run: |
          git config --global user.name "github-actions"
          git config --global user.email "github-actions@github.com"

          git add master/master_ng_swing_gdd_v2.xlsx
          git add audit/last_extracted_ng_swing_gdd.csv

          git commit -m "Update NG Swing GDD v2 master prices" || echo "No changes to commit"
          git push
