name: Update NG Swing GDD Master

on:
  workflow_dispatch:
    inputs:
      start_date:
        description: "Start Column D / Strip date to pull, format YYYY-MM-DD"
        required: true
        default: "2026-06-01"
      end_date:
        description: "End Column D / Strip date to pull, format YYYY-MM-DD"
        required: true
        default: "2026-06-01"

jobs:
  update-master:
    runs-on: ubuntu-latest

    permissions:
      contents: write

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Confirm input files
        run: |
          echo "Repository files:"
          find . -maxdepth 4 -type f
          echo ""
          echo "Checking for daily file..."
          test -f input/icecleared_latest.xlsx

      - name: Update master workbook
        run: |
          python src/update_ng_swing_master.py \
            --daily input/icecleared_latest.xlsx \
            --master master/master_ng_swing_gdd.xlsx \
            --output master/master_ng_swing_gdd.xlsx \
            --start "${{ github.event.inputs.start_date }}" \
            --end "${{ github.event.inputs.end_date }}" \
            --audit-dir audit

      - name: Upload audit artifact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: ng-swing-gdd-audit
          path: |
            audit/*.csv
            master/master_ng_swing_gdd.xlsx
          if-no-files-found: ignore

      - name: Commit updated files
        if: success()
        run: |
          git config --global user.name "github-actions"
          git config --global user.email "github-actions@github.com"

          git add master/master_ng_swing_gdd.xlsx
          git add audit/last_extracted_ng_swing_gdd.csv

          git commit -m "Update NG Swing GDD master prices" || echo "No changes to commit"
          git push
